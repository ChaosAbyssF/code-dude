version: 1

goal:
  summary: "Describe the objective"
  success_definition: "Describe what the verifier should prove when the task is done"

verification:
  entrypoint: "./path/to/verify.sh"
  working_directory: "."
  expected_artifact_root: "./runs"
  notes:
    - "Describe expected output naming if known"

runtime:
  type: "local"
  local:
    shell: "bash"
  remote:
    ssh_user: ""
    ssh_host: ""
    workspace: ""
  container:
    name: ""
    workspace: ""
  remote_container:
    ssh_user: ""
    ssh_host: ""
    container_name: ""
    workspace: ""

attention_points:
  - "List important constraints here"

tracking:
  unresolved_issues_dir: ".code-dude/unresolved-issues"
  scenario_models_dir: ".code-dude/scenario-models"
  current_status_dir: ".code-dude/current-status"
  lessons_dir: ".code-dude/lessons"
  user_profile_dir: ".code-dude/user-profile"
  reports_dir: ".code-dude/reports"

cleanup:
  trial_cleanup_threshold: 15
  keep_recent_trials: 5
